version: "3.7"

services:
  web:
    image: ghcr.io/flexusmark/cost-based:latest
    restart: unless-stopped
    init: true
    ports:
      - "4568:5000"
    volumes:
      - "${APP_DATA_DIR}/data:/data"
    networks:
      - default
      - umbrel_main_network
    environment:
      # SQLite database file (inside the persistent /data volume)
      DATABASE_PATH: "/data/cost_basis.db"

      # Electrs — Electrum JSON-RPC over TCP
      ELECTRS_HOST: "10.21.21.10"
      ELECTRS_PORT: "50001"

      # Mempool — connect directly to the API container on umbrel_main_network
      MEMPOOL_URL: "http://mempool_api_1:8999"

      # Cost basis defaults (can be overridden per-request in the UI)
      DEFAULT_CURRENCY: "USD"
      GAP_LIMIT: "20"
      COST_BASIS_METHOD: "HIFO"

      # Flask session secret (Umbrel provides a unique seed per app)
      SECRET_KEY: "${APP_SEED}"

networks:
  umbrel_main_network:
    external: true
