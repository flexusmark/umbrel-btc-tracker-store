version: "3.7"

services:
  web:
    image: ghcr.io/flexusmark/btc-tracker:latest
    restart: unless-stopped
    init: true
    ports:
      - "4567:5000"
    volumes:
      - "${APP_DATA_DIR}/data:/data"
    environment:
      # Electrs Electrum TCP protocol connection (hardcoded Umbrel IP)
      ELECTRS_HOST: "10.21.21.10"
      ELECTRS_PORT: "50001"
      # Flask secret key — Umbrel provides a unique seed per app
      SECRET_KEY: "${APP_SEED}"
      # SQLite database path (inside the /data volume)
      DB_PATH: "/data/btc_tracker.db"
